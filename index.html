<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthcare Landing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f8fbff;
    color:#1f2d3d;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 0;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#2F80ED;
}

.nav-links a{
    margin:0 15px;
    text-decoration:none;
    color:#1f2d3d;
    font-weight:500;
}

.nav-btn{
    background:#2F80ED;
    color:#fff;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:500;
}

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px 0;
}

.hero-text{
    flex:1;
}

.hero-text h1{
    font-size:48px;
    font-weight:700;
    margin-bottom:20px;
}

.hero-text p{
    font-size:16px;
    margin-bottom:30px;
    color:#6c7a89;
}

.input-group{
    display:flex;
    gap:10px;
}

.input-group input{
    padding:12px;
    width:250px;
    border-radius:8px;
    border:1px solid #ddd;
}

.input-group button{
    padding:12px 20px;
    border:none;
    background:#2F80ED;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

.hero-img{
    flex:1;
    text-align:right;
}

.hero-img img{
    width:400px;
    border-radius:20px;
}

.stats{
    display:flex;
    justify-content:space-between;
    padding:40px 0;
    text-align:center;
}

.stat-box h2{
    color:#2F80ED;
    font-size:32px;
}

.stat-box p{
    font-size:14px;
    color:#6c7a89;
}

@media(max-width:900px){
    .hero{
        flex-direction:column;
        text-align:center;
    }
    .hero-img{
        margin-top:30px;
        text-align:center;
    }
    .stats{
        flex-direction:column;
        gap:20px;
    }
}
</style>
</head>

<body>

<div class="container">

<nav>
    <div class="logo">PharmaCare</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#" class="nav-btn">Get Started</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Save Time.<br>Healthcare Online</h1>
        <p>Consult trusted healthcare professionals from your home easily and securely.</p>

        <div class="input-group">
            <input type="email" placeholder="Enter your email">
            <button>Get Started</button>
        </div>
    </div>

    <div class="hero-img">
        <img src="https://images.unsplash.com/photo-1537368910025-700350fe46c7" alt="Doctor">
    </div>
</section>

<section class="stats">
    <div class="stat-box">
        <h2>4.9★</h2>
        <p>Average Rating</p>
    </div>
    <div class="stat-box">
        <h2>HHS</h2>
        <p>Certified Doctors</p>
    </div>
    <div class="stat-box">
        <h2>2M+</h2>
        <p>Online Consultations</p>
    </div>
</section>

</div>

</body>
</html>
